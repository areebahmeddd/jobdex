<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary meta -->
  <title>JobDex: Map-First Job Discovery</title>

    content="A global index of startup hiring by city. Explore jobs on an interactive world map." />
  <link rel="canonical" href="https://jobdex.1mindlabs.org" />

  <!-- Open Graph -->

    content="A global index of startup hiring by city. Explore jobs on an interactive world map." />

    content="A global index of startup hiring by city. Explore jobs on an interactive world map." />

      }
